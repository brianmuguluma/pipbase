<main class="grid min-h-screen place-items-center px-6 py-24 sm:py-32 lg:px-8">
  <div class="text-center">
    <p class="text-primary text-base font-semibold">
      {{ status || 404 }}
    </p>
    <h1
      class="mt-4 text-3xl font-bold tracking-tight first-letter:uppercase sm:text-5xl"
    >
      {{ (error()?.errorCode | noCase) || "Page not found" }}
    </h1>
    <p class="text-content2 mt-6 text-base leading-7">
      {{
        error()?.errorMessage ||
          "Sorry, we couldn't find the page you're looking for."
      }}
    </p>
    <div class="mt-10 flex items-center justify-center gap-x-6">
      <a
        routerLink="/"
        class="btn btn-primary rounded-md px-3.5 py-2.5 text-sm font-semibold"
      >
        Go back home
      </a>
    </div>
  </div>
</main>
