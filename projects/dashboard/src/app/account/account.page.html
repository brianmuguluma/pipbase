@if (!app.account()) {
<app-spinner />
} @if (app.account()) {
<main class="overflow-hidden">
  <header class="relative isolate">
    <div class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
      <app-breadcrumbs
        [breadcrumbs]="[{ title: 'Account', route: '/account' }, { title: app.account()?.alias!, route: '/account' }]"
      />
      <div class="mt-8 flex justify-between">
        <h3 class="page-heading">Account</h3>
        @if (app.account()) {
        <app-environment [isPaperTrading]="app.isPaperTrading()!" />
        }
      </div>
    </div>
  </header>

  <!-- Stats -->
  <app-account-stats />

  <div class="mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8">
    <div
      class="mx-auto grid max-w-2xl grid-cols-1 grid-rows-1 items-start gap-x-8 gap-y-8 lg:mx-0 lg:max-w-none lg:grid-cols-3"
    >
      <!-- Details -->
      <app-account-details class="lg:col-span-2 lg:row-span-2 lg:row-end-2" />

      <!-- Recent activity -->
      <app-account-activity class="lg:col-start-3" />
    </div>
  </div>
</main>
}

<!-- Footer -->
@if (app.account()) { <app-footer /> }
