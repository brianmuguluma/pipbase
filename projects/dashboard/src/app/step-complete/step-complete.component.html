<li class="relative md:flex md:flex-1">
  <!-- Completed Step -->
  <a class="group flex w-full items-center">
    <span class="flex items-center px-6 py-4 text-sm font-medium">
      <app-step-complete-icon />

  @if (displaySeperator()) {
    <app-step-seperator />
  }
</li>
