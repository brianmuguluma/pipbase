<!-- Spinner -->
@if (trade() === undefined && !error()) { <app-spinner /> }

<!-- Page not found -->
@if (!trade() && error()) {
<app-page-not-found [status]="status()" [error]="error()" />
}

<!-- Trade -->
@if (trade()) {
<main class="overflow-hidden">
  <header class="relative isolate">
    <div class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
      <app-breadcrumbs
        [breadcrumbs]="[{ title: 'Trades', route: '/trades' }, { title: id()!, route: '/trades/' + id()! }]"
      />
      <div class="mt-8 flex items-center justify-between">
        <div>
          <h3 class="page-heading">Trade</h3>
        </div>
        @if (isOpen()) {
        <div for="close-trade" class="flex items-center gap-x-4 sm:gap-x-6">
          <label (click)="closeTrade()" class="btn btn-error px-3 py-2">
            Close
          </label>
        </div>
        }
      </div>
      <div
        class="mx-auto flex max-w-2xl items-center justify-between gap-x-8 lg:mx-0 lg:max-w-none"
      ></div>
    </div>
  </header>

  <!-- Stats -->
  <app-trade-stats [trade]="trade()" />

  <div class="mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8">
    <div
      class="mx-auto grid max-w-2xl grid-cols-1 grid-rows-1 items-start gap-x-8 gap-y-8 lg:mx-0 lg:max-w-none lg:grid-cols-3"
    >
      <!-- Snapshot -->
      @defer { <app-snapshot [trade]="trade()!" /> }

      <!-- Dependants -->
      @if (dependants()) { <app-trade-dependants [trade]="trade()!" /> }

      <!-- Details -->
      <app-trade-details
        class="lg:col-span-2 lg:row-span-2 lg:row-end-2"
        [trade]="trade()!"
      />
    </div>
  </div>
</main>
}

<!-- Footer -->
@if (trade()) { <app-footer /> }

<!-- Close trade -->
<input class="modal-state" id="close-trade" type="checkbox" />
<div class="modal">
  <label class="modal-overlay" for="close-trade"></label>
  <div class="modal-content flex flex-col gap-5">
    <label
      for="close-trade"
      class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2"
    >
      ✕
    </label>
    <h2 class="text-xl font-semibold leading-7">
      Close Trade {{ trade()?.id }}
    </h2>
    <div>
      <p class="text-content2 mt-1 text-sm leading-6">
        Are you sure you want to close this trade?
      </p>
    </div>
    <div class="flex gap-3">
      <button (click)="closeTrade()" class="btn btn-error btn-block">
        Close
      </button>

      <label for="close-trade" class="btn btn-block">Cancel</label>
    </div>
  </div>
</div>
