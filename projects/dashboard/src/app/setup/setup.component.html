<main class="mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8">
  <div class="md:flex md:items-center md:justify-between">
    <div class="min-w-0 flex-1">
      <h2
        class="text-2xl font-bold leading-7 sm:truncate sm:text-3xl sm:tracking-tight"
      >
        Setup your account
      </h2>
    </div>
  </div>

  <app-steps />

  @if (!auth.profile()?.emailVerified) {
    <app-email />
  }
  @if (auth.profile()?.emailVerified && !auth.hasApiKey()) {
    <app-credentials />
  }
  @if (auth.hasApiKey() && !auth.hasAccountId()) {
    <app-accounts />
  }
</main>
