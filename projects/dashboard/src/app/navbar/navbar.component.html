<section class="navbar border-border border-b shadow-none" #header>
  <div class="w-fit">
    <label for="menu" class="btn btn-ghost btn-circle lg:hidden">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="h-6 w-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
        />
      </svg>
    </label>
  </div>
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-4">
    <div class="navbar-start">
      <div class="dropdown">
        <label
          class="btn btn-ghost bg-transparent p-0 hover:bg-transparent"
          tabindex="0"
        >
          {{ app.account()?.alias || "Select an account" }}
          <!-- Heroicon name: solid/chevron-down -->
          <svg
            class="-mr-1 ml-2 h-5 w-5"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
              clip-rule="evenodd"
            />
          </svg>
        </label>
        <div
          class="dropdown-menu dropdown-menu-bottom-right border-border gap-1 border"
        >
          @for (account of app.summaries(); track $index) {
            <a
              (click)="selectAccount(account)"
              class="dropdown-item flex flex-row items-center justify-between text-sm"
              [ngClass]="
                account.id === app.account()?.id ? 'dropdown-active' : ''
              "
            >
              {{ account.alias }}
              @if (account.id === app.account()?.id) {
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  class="fill-success h-5 w-5"
                >
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm13.36-1.814a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l3.75-5.25Z"
                  ></path>
                </svg>
              }
            </a>
          }
        </div>
      </div>
    </div>
    <div class="navbar-end">
      <div class="avatar avatar-ring avatar-md">
        <div class="dropdown-container">
          <div class="dropdown">
            <label class="btn btn-ghost flex cursor-pointer px-0" tabindex="0">
              <div
                class="aspect-square h-full w-full overflow-hidden rounded-full"
              >
                <app-avatar />
              </div>
            </label>
            <div
              class="dropdown-menu dropdown-menu-bottom-left border-border border"
            >
              <a routerLink="/settings" class="dropdown-item text-sm">
                Settings
              </a>
              <button
                (click)="auth.signOut()"
                class="dropdown-item text-error text-sm"
              >
                Sign out
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
