<!-- Spinner -->
@if (instances() === undefined) {
<app-spinner />
}

<!-- Page not found -->
@if (instances() && !instances()?.instances?.length) {
<app-page-not-found />
}

<!-- Instance -->
@if (instance()) {
<main>
  <header class="relative isolate">
    <app-header />
    <div class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
      <div class="flex justify-between">
        <div>
          <app-breadcrumbs
            [breadcrumbs]="[{ title: 'Server', route: '/instance' }]"
          />
          <div class="mt-8">
            <div>
              <h3 class="page-heading">Server</h3>
            </div>
          </div>
        </div>
      </div>
      <div
        class="mx-auto flex max-w-2xl items-center justify-between gap-x-8 lg:mx-0 lg:max-w-none"
      ></div>
    </div>
  </header>
  <div class="mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8">
    <div
      class="mx-auto grid max-w-2xl grid-cols-1 grid-rows-1 items-start gap-x-8 gap-y-8 lg:mx-0 lg:max-w-none lg:grid-cols-3"
    >
      <!-- Bot -->
      <app-bot class="lg:col-start-3 lg:row-end-1" />

      <!-- Instance -->
      <app-instance
        [instance]="instance()!"
        class="lg:col-span-2 lg:row-span-2 lg:row-end-2"
      />
    </div>
  </div>
</main>
}

<!-- Footer -->
@if (instance()) { <app-footer /> }
