<ion-item button>
  @if (avatar()) {
    <ion-avatar slot="start">
      <ion-skeleton-text animated style="width: 100%" />
    </ion-avatar>
  }
  <ion-label class="ion-no-margin flex justify-between gap-x-6 py-5">
    <ion-skeleton-text animated class="skeleton" style="width: 20%" />
    <ion-skeleton-text animated class="skeleton" style="width: 30%" />
    <ion-skeleton-text animated class="skeleton" style="width: 40%" />
  </ion-label>
</ion-item>
