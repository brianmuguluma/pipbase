<ion-button [id]="id" fill="clear" shape="round">
  <ion-icon slot="icon-only" name="information-circle-outline" />
</ion-button>

<ion-popover
  [trigger]="id"
  translucent
  [dismissOnSelect]="true"
  triggerAction="click"
>
  <ng-template>
    <ion-content class="ion-padding">
      <ion-text color="dark">{{ tip() }}</ion-text>
    </ion-content>
  </ng-template>
</ion-popover>
