<ion-item [routerLink]="['/positions', position()?.instrument]">
  <ion-label
    class="ion-no-margin flex justify-between gap-x-6 py-5 font-semibold"
  >
    <ion-text color="dark">
      {{ displayName() || position()?.instrument | slash }}
    </ion-text>
  </ion-label>
  @if (isOpen()) {
    <ion-icon slot="end" name="ellipse" size="small" color="success" />
  }
</ion-item>
