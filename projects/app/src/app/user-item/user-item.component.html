<ion-item [routerLink]="['/users', user().uid]">
  <ion-avatar slot="start" class="overflow-hidden rounded-full">
    <app-avatar [user]="user()" />
  </ion-avatar>
  <ion-label class="ion-no-margin flex justify-between gap-x-6 py-5">
    <ion-text color="dark" class="font-semibold leading-6">
      {{ user().displayName || "-" }}
    </ion-text>
    <ion-text color="dark" class="block truncate">
      {{ user().email }}
    </ion-text>
    <ion-note>
      Last signed in
      {{ user().metadata.lastSignInTime | formatRelative }}
    </ion-note>
  </ion-label>
  @if (user().emailVerified) {
    <ion-icon slot="end" name="checkmark-circle" color="success" />
  }
</ion-item>
