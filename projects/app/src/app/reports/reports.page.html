<ion-header collapse="fade" translucent>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button />
    </ion-buttons>
    <ion-title>Reports</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Reports</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-refresher
    slot="fixed"
    (ionRefresh)="refresh($any($event))"
    pullFactor="0.8"
    pullMin="60"
    pullMax="120"
  >
    <ion-refresher-content />
  </ion-refresher>

  @if (!months().length) {
  <ion-list lines="none" class="divide-y divide-gray-100 dark:divide-white/5">
    @for (i of [].constructor(10); track i) {
    <div>
      <app-item-skeleton />
    </div>
    }
  </ion-list>
  } @if (months().length) {
  <ion-list lines="none" class="divide-y divide-gray-100 dark:divide-white/5">
    @for (month of months(); track month) {
    <div>
      <app-report-item [month]="month" />
    </div>
    }
  </ion-list>
  }
</ion-content>
