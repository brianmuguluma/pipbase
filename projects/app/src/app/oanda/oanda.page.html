<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/settings" />
    </ion-buttons>
    <ion-title>Oanda</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Oanda</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="space-y-12 divide-y divide-black/10 dark:divide-white/10">
    <div>
      <app-credentials />
    </div>

    <div class="pt-10">
      <app-accounts />
    </div>
  </div>
</ion-content>
