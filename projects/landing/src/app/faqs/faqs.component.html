<div
  class="mx-auto mt-12 max-w-2xl divide-y divide-gray-900/10 px-6 pb-8 sm:mt-32 sm:pb-24 sm:pt-12 lg:max-w-7xl lg:px-8 lg:pb-32 dark:divide-white/10"
>
  <h2 class="text-2xl font-bold leading-10 tracking-tight">
    Frequently asked questions
  </h2>
  <dl class="divide-gray-4 mt-10 space-y-8 divide-y">
    @for (faq of faqs(); track faq) {
      <div class="pt-8 lg:grid lg:grid-cols-12 lg:gap-8">
        <dt class="text-base font-semibold leading-7 lg:col-span-5">
          {{ faq.question }}
        </dt>
        <dd class="mt-4 lg:col-span-7 lg:mt-0">
          <p class="text-content2 text-base leading-7">
            {{ faq.answer }}
          </p>
        </dd>
      </div>
    }
  </dl>
</div>
