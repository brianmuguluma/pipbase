@if (!user()?.photoURL && user()?.displayName) {
  <span class="avatar inline-flex h-full w-full items-center justify-center">
    <span
      class="font-medium leading-none"
      [ngClass]="size() === 'large' ? 'text-3xl' : 'text-sm'"
    >
      {{ user()?.displayName || auth.profile()?.displayName | slice: 0 : 1 }}
    </span>
  </span>
}
